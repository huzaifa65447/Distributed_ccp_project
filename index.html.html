<!DOCTYPE html>
<html>
<head>
    <title>Parallel Dijkstra Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Parallel Dijkstra Algorithm (huzaifa-65447)</h1>

    <button onclick="generateRecords()">
        Generate 14000 Records
    </button>

    <button onclick="loadDB()">
        Load Database
    </button>

    <br><br>

    <input type="number"
           id="source"
           placeholder="Source Node">

    <input type="number"
           id="destination"
           placeholder="Destination Node">

    <br><br>

    <button onclick="findPath()">
        Find Shortest Path
    </button>

    <div class="output">
        <h3>Results</h3>

        <p id="distance">
            Distance: --
        </p>

        <p id="time">
            Execution Time: --
        </p>

        <p id="path">
            Path: --
        </p>
    </div>

    <h3>Shortest Path Visualization</h3>

    <canvas id="pathCanvas"
            width="900"
            height="250"
            style="border:2px solid black;
                   background:white;">
    </canvas>

    <br><br>

    <h3>Performance Comparison</h3>

    <canvas id="chart"
            width="400"
            height="200">
    </canvas>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</body>
</html>
